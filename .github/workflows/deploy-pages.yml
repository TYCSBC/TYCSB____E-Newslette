name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: Web
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
      FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
      FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
      FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
      RECIPIENT_COLLECTION: recipients

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Build static site
        shell: bash
        run: |
          set -euo pipefail

          rm -rf _site
          mkdir -p _site

          find . -maxdepth 1 -type f \( -name '*.html' -o -name '*.css' -o -name '*.js' -o -name '*.png' -o -name '*.jpg' -o -name '*.jpeg' -o -name '*.gif' -o -name '*.svg' -o -name '*.ico' \) \
            ! -name 'unsubscribe_page.template.html' \
            -exec cp '{}' _site/ \;

          cp unsubscribe_page.template.html _site/unsubscribe.html

          test -n "$FIREBASE_API_KEY"
          test -n "$FIREBASE_AUTH_DOMAIN"
          test -n "$FIREBASE_PROJECT_ID"
          test -n "$FIREBASE_STORAGE_BUCKET"
          test -n "$FIREBASE_MESSAGING_SENDER_ID"
          test -n "$FIREBASE_APP_ID"
          test -n "$RECIPIENT_COLLECTION"

          perl -0pi -e 's|__FIREBASE_API_KEY__|$ENV{FIREBASE_API_KEY}|g' _site/unsubscribe.html
          perl -0pi -e 's|__FIREBASE_AUTH_DOMAIN__|$ENV{FIREBASE_AUTH_DOMAIN}|g' _site/unsubscribe.html
          perl -0pi -e 's|__FIREBASE_PROJECT_ID__|$ENV{FIREBASE_PROJECT_ID}|g' _site/unsubscribe.html
          perl -0pi -e 's|__FIREBASE_STORAGE_BUCKET__|$ENV{FIREBASE_STORAGE_BUCKET}|g' _site/unsubscribe.html
          perl -0pi -e 's|__FIREBASE_MESSAGING_SENDER_ID__|$ENV{FIREBASE_MESSAGING_SENDER_ID}|g' _site/unsubscribe.html
          perl -0pi -e 's|__FIREBASE_APP_ID__|$ENV{FIREBASE_APP_ID}|g' _site/unsubscribe.html
          perl -0pi -e 's|__RECIPIENT_COLLECTION__|$ENV{RECIPIENT_COLLECTION}|g' _site/unsubscribe.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
